<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FinPackV2 — BTC Smart Money</title>

    <!-- Lightweight Charts (TradingView) -->
    <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>

    <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<!-- ========== HEADER ========== -->
<header class="app-header">
    <div class="header-left">
        <span class="logo">FinPackV2</span>
        <span class="subtitle">BTC Smart Money Concepts</span>
    </div>
    <div class="header-right">
        <span class="price-label">BTC-USD</span>
        <span class="price-value" id="btc-price">-</span>
    </div>
</header>

<!-- ========== MAIN LAYOUT ========== -->
<main class="app-main">

    <!-- ===== 上半區：K 線 + 信號控制 ===== -->
    <section class="chart-section">

        <!-- K 線圖 -->
        <div class="chart-panel">
            <div class="chart-toolbar">
                <div class="tf-buttons">
                    <button class="tf-btn active" data-timeframe="1d">1D</button>
                    <button class="tf-btn" data-timeframe="4h">4H</button>
                    <button class="tf-btn" data-timeframe="1h">1H</button>
                </div>
                <span class="chart-title">BTC-USD K 線</span>
            </div>

            <div class="chart-wrapper">
                <div id="chart-container"></div>
                <div id="chart-loading" class="chart-loading-overlay">
                    <span>載入中...</span>
                </div>
            </div>
        </div>

        <!-- SMC 信號控制面板 -->
        <aside class="signal-panel">
            <h3 class="panel-title">SMC 信號</h3>

            <div class="signal-toggles">
                <label class="toggle-row">
                    <input type="checkbox" id="toggle-bos" checked />
                    <span class="toggle-track"></span>
                    <span class="toggle-label">
                        <span class="dot bos-bull"></span>BOS（結構突破）
                    </span>
                </label>

                <label class="toggle-row">
                    <input type="checkbox" id="toggle-choch" checked />
                    <span class="toggle-track"></span>
                    <span class="toggle-label">
                        <span class="dot choch-bull"></span>ChOCH（結構翻轉）
                    </span>
                </label>

                <label class="toggle-row">
                    <input type="checkbox" id="toggle-fvg" checked />
                    <span class="toggle-track"></span>
                    <span class="toggle-label">
                        <span class="dot fvg-bull"></span>FVG（公平價值缺口）
                    </span>
                </label>

                <label class="toggle-row">
                    <input type="checkbox" id="toggle-ob" checked />
                    <span class="toggle-track"></span>
                    <span class="toggle-label">
                        <span class="dot ob-bull"></span>Order Block
                    </span>
                </label>

                <label class="toggle-row">
                    <input type="checkbox" id="toggle-lp" checked />
                    <span class="toggle-track"></span>
                    <span class="toggle-label">
                        <span class="dot lp-buy"></span>流動性池（LP）
                    </span>
                </label>
            </div>

            <div class="signal-legend">
                <div class="legend-item">
                    <span class="legend-dot bull"></span><span>多頭 / 看漲</span>
                </div>
                <div class="legend-item">
                    <span class="legend-dot bear"></span><span>空頭 / 看跌</span>
                </div>
            </div>
        </aside>
    </section>

    <!-- ===== 下半區：合約回測 ===== -->
    <section class="backtest-section">
        <h2 class="section-title">SMC 合約回測</h2>

        <div class="backtest-layout">

            <!-- 表單 -->
            <form id="backtest-form" class="backtest-form">

                <!-- 資金設定 -->
                <fieldset class="form-group">
                    <legend>資金設定</legend>

                    <div class="form-row">
                        <label for="initial-capital">初始資金 (USD)</label>
                        <input type="number" id="initial-capital" value="10000" min="100" step="100" />
                    </div>

                    <div class="form-row">
                        <label for="leverage">槓桿倍數</label>
                        <input type="number" id="leverage" value="1" min="1" max="125" step="1" />
                        <span class="input-hint" id="liq-hint">現貨模式（無強平風險）</span>
                    </div>

                    <div class="form-row">
                        <label for="risk-per-trade">每筆風險 (%)</label>
                        <input type="number" id="risk-per-trade" value="2" min="0.1" max="100" step="0.1" />
                    </div>

                    <div class="form-row">
                        <label for="start-date">回測起始日</label>
                        <input type="date" id="start-date" value="2022-01-01" />
                    </div>

                    <div class="form-row">
                        <label for="end-date">結束日（留空=最新）</label>
                        <input type="date" id="end-date" />
                    </div>

                    <div class="form-row">
                        <label for="timeframe">時間框架</label>
                        <select id="timeframe">
                            <option value="1d" selected>1D（日線）</option>
                            <option value="4h">4H</option>
                            <option value="1h">1H</option>
                        </select>
                    </div>
                </fieldset>

                <!-- 方向設定 -->
                <fieldset class="form-group">
                    <legend>交易方向</legend>
                    <div class="radio-group">
                        <label class="radio-row">
                            <input type="radio" name="direction" value="long" checked />
                            <span class="radio-label long-label">多方（Long）</span>
                        </label>
                        <label class="radio-row">
                            <input type="radio" name="direction" value="short" />
                            <span class="radio-label short-label">空方（Short）</span>
                        </label>
                        <label class="radio-row">
                            <input type="radio" name="direction" value="both" />
                            <span class="radio-label">雙向（Long + Short）</span>
                        </label>
                    </div>
                </fieldset>

                <!-- 進場條件 -->
                <fieldset class="form-group">
                    <legend>進場條件</legend>
                    <div class="checkbox-grid">
                        <label class="check-row">
                            <input type="checkbox" id="cond-bias" checked />
                            結構偏向確認（Bias）
                        </label>
                        <label class="check-row">
                            <input type="checkbox" id="cond-discount" checked />
                            折扣 / 溢價區過濾
                        </label>
                        <label class="check-row">
                            <input type="checkbox" id="cond-ob" checked />
                            Order Block 觸發
                        </label>
                        <label class="check-row">
                            <input type="checkbox" id="cond-fvg" checked />
                            FVG 回補觸發
                        </label>
                    </div>
                </fieldset>

                <!-- 出場條件 -->
                <fieldset class="form-group">
                    <legend>出場條件</legend>
                    <div class="checkbox-grid">
                        <label class="check-row">
                            <input type="checkbox" id="exit-sl" checked />
                            固定止損
                            <input type="number" id="stop-loss-pct" value="2" min="0.1" max="50" step="0.1" class="inline-input" />%
                        </label>
                        <label class="check-row">
                            <input type="checkbox" id="exit-tp-lp" checked />
                            流動性池止盈
                        </label>
                        <label class="check-row">
                            <input type="checkbox" id="exit-structure" checked />
                            結構翻轉出場（ChOCH）
                        </label>
                        <label class="check-row">
                            <input type="checkbox" id="exit-max-bars" checked />
                            最大持倉
                            <input type="number" id="max-holding-bars" value="30" min="1" max="500" step="1" class="inline-input" />
                            根K棒
                        </label>
                    </div>
                </fieldset>

                <div class="form-actions">
                    <button type="submit" id="run-backtest-btn" class="btn-primary">執行回測</button>
                </div>

            </form>

            <!-- 回測結果 -->
            <div id="backtest-result" class="backtest-result">
                <p class="placeholder-text">設定參數後點擊「執行回測」</p>
            </div>

        </div><!-- .backtest-layout -->
    </section>
</main>

<footer class="app-footer">
    <span>FinPackV2 · BTC-USD SMC Strategy · 僅供研究參考，不構成投資建議</span>
</footer>

<script type="module" src="/js/app.js"></script>
</body>
</html>
